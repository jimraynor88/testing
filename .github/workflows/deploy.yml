# ─────────────────────────────────────────────────────────────
# Ejemplo deploy.yml (.github/workflows/deploy.yml)
name: build

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: install
        run: |
          pip install --upgrade pip
          pip install properdocs material for mkdocs pymdown-extensions mkdocs-awesome-pages-plugin mkdocs-section-index mkdocs-rss-plugin mkdocs-blogging-plugin mkdocs-git-revision-date-localized-plugin mkdocs-git-authors-plugin mkdocs-minify-plugin mkdocs-glightbox mkdocs-macros-plugin mkdocs-include-markdown-plugin mkdocs-redirects
      - name: Build and Deploy
        run: |
          properdocs build
          echo "testing.jim88.pp.ua" > ./site/CNAME
          properdocs gh-deploy --force
