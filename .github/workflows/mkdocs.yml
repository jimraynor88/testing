name: build

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: install
        run: |
          pip install --upgrade pip
          pip install mkdocs mkdocs-material pymdown-extensions \
          mkdocs-awesome-pages-plugin mkdocs-section-index \
          mkdocs-rss-plugin mkdocs-blogging-plugin \
          mkdocs-git-revision-date-localized-plugin \
          mkdocs-git-authors-plugin mkdocs-minify-plugin \
          mkdocs-glightbox mkdocs-macros-plugin \
          mkdocs-include-markdown-plugin mkdocs-redirects

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force --remote-url https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/jimraynor88/testing.git
