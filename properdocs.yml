site_name: Mi Documentación de Prueba
site_description: Probando ProperDocs con Material y Curriculum-Vitae
site_author: Tu Nombre
repo_url: https://ko-fi.com/invito
repo_name: Invítame al Ko-Fi
edit_uri: ""

theme:
  name: material
  palette:
    scheme: default
    primary: indigo
    accent: indigo
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/solid/mug-hot   # <-- AQUÍ también
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight

plugins:
  - search
  - redirects
  - bettertags
  - awesome-pages
  - section-index
  - rss

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - meta
  - toc:
      permalink: true
  - pymdownx.arithmatex
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.tasklist
  - pymdownx.tilde

nav:
  - Inicio: index.md
  - Acerca de: about.md
  - Experiencia: experiencia.md
  - Educación: educacion.md
  - Habilidades: habilidades.md

extra:
  social:
    - icon: fontawesome/solid/mug-hot
      link: https://ko-fi.com/invito
      name: Invítame al Ko-Fi
